name: Auto-Publish Live TDF Scraper

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Elite Scraping Engine
        run: |
          pip install procyclingstats beautifulsoup4 requests

      - name: Run L33T ProCyclingStats Pipeline
        run: |
          python -c '
          import json
          import sys
          from procyclingstats import Race

          print("[L33T_SYS] Initializing ProCyclingStats API wrapper...")
          try:
              # Querying official Tour de France 2026 race object
              race = Race("race/tour-de-france/2026")
              print("[L33T_SYS] Successfully connected to ProCyclingStats Tour de France 2026 feed!")
              
              # Attempting to fetch stage results or classification data
              stages = race.stages() if hasattr(race, "stages") else []
              print(f"[L33T_SYS] Retrieved {len(stages)} stage records from live feed.")

              live_payload = []
              for idx, stage in enumerate(stages, start=1):
                  live_payload.append({
                      "stage": idx,
                      "type": stage.get("stage_name", "LIVE STAGE"),
                      "pos1": 50,
                      "pos2": 30,
                      "pos3": 20
                  })

              if not live_payload:
                  raise ValueError("Parsed payload is empty.")

              with open("races.json", "w") as f:
                  json.dump(live_payload, f, indent=4)
              print("[L33T_SYS] races.json successfully updated with live API telemetry!")

          except Exception as e:
              print(f"[CRITICAL ERROR] Live telemetry extraction failed: {e}")
              sys.exit(1)
          '

      - name: Commit and Push Data
        run: |
          git config user.name "L33T Scraper Bot"
          git config user.email "actions@github.com"
          git add races.json
          git commit -m "L33T live telemetry sync" || echo "No changes to commit"
          git push
