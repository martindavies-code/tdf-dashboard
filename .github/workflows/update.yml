name: Auto-Publish Live TDF Scraper

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Elite Dependencies
        run: |
          pip install cloudscraper procyclingstats beautifulsoup4 requests

      - name: Run Monkeypatched L33T Scraper
        run: |
          python -c '
          import json
          import sys
          import requests
          import cloudscraper

          # L33T Monkeypatch: Force procyclingstats requests to route through cloudscraper
          requests.Session = cloudscraper.create_scraper
          print("[L33T_SYS] Monkeypatched requests.Session with cloudscraper engine.")

          from procyclingstats import Race

          try:
              print("[L33T_SYS] Connecting to ProCyclingStats TDF 2026 feed...")
              race = Race("race/tour-de-france/2026")
              stages = race.stages() if hasattr(race, "stages") else []
              print(f"[L33T_SYS] Successfully bypassed Cloudflare! Retrieved {len(stages)} stages.")

              live_payload = []
              for idx, stage in enumerate(stages, start=1):
                  live_payload.append({
                      "stage": idx,
                      "type": stage.get("stage_name", "LIVE STAGE"),
                      "pos1": 50,
                      "pos2": 30,
                      "pos3": 20
                  })

              if not live_payload:
                  raise ValueError("Empty stage payload returned.")

              with open("races.json", "w") as f:
                  json.dump(live_payload, f, indent=4)
              print("[L33T_SYS] races.json updated successfully with live scraped data!")

          except Exception as e:
              print(f"[CRITICAL ERROR] Scrape failed: {e}")
              sys.exit(1)
          '

      - name: Commit and Push Data
        run: |
          git config user.name "L33T Scraper Bot"
          git config user.email "actions@github.com"
          git add races.json
          git commit -m "L33T monkeypatched live sync update" || echo "No changes to commit"
          git push
